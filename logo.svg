<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1035"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="320" rx="40" fill="url(#bg)"/>

  <!-- Outer border glow -->
  <rect width="320" height="320" rx="40" fill="none" stroke="url(#border)" stroke-width="2" opacity="0.6"/>

  <!-- Terminal window card -->
  <rect x="30" y="44" width="260" height="170" rx="12" fill="#13112a" stroke="#2d2b55" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="30" y="44" width="260" height="36" rx="12" fill="#1e1b4b"/>
  <rect x="30" y="62" width="260" height="18" fill="#1e1b4b"/>

  <!-- Traffic lights -->
  <circle cx="56" cy="62" r="6" fill="#ef4444" opacity="0.9"/>
  <circle cx="75" cy="62" r="6" fill="#f59e0b" opacity="0.9"/>
  <circle cx="94" cy="62" r="6" fill="#22c55e" opacity="0.9"/>

  <!-- Title bar label -->
  <text x="160" y="67" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#6366f1" opacity="0.8">opencode x autobe</text>

  <!-- Terminal content -->
  <!-- Line 1: prompt + command -->
  <text x="50" y="104" font-family="ui-monospace,SFMono-Regular,monospace" font-size="12" fill="#4ade80">&#10095;</text>
  <text x="65" y="104" font-family="ui-monospace,SFMono-Regular,monospace" font-size="12" fill="#e2e8f0">autobe_generate</text>
  <!-- cursor blink -->
  <rect x="192" y="92" width="7" height="14" fill="#6366f1" opacity="0.9" rx="1"/>

  <!-- Line 2 -->
  <text x="50" y="124" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#22c55e">  v</text>
  <text x="72" y="124" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#a5b4fc">analysing requirements</text>

  <!-- Line 3 -->
  <text x="50" y="141" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#22c55e">  v</text>
  <text x="72" y="141" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#a5b4fc">prisma schema</text>

  <!-- Line 4 -->
  <text x="50" y="158" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#22c55e">  v</text>
  <text x="72" y="158" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#a5b4fc">openapi spec</text>

  <!-- Line 5 (in progress) -->
  <text x="50" y="175" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#f59e0b">  *</text>
  <text x="72" y="175" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#fcd34d">generating nestjs...</text>

  <!-- Progress bar section -->
  <rect x="30" y="214" width="260" height="58" rx="12" fill="#13112a" stroke="#2d2b55" stroke-width="1.5"/>

  <!-- Three stacked bars -->
  <rect x="46" y="226" width="180" height="8" rx="4" fill="#1e1b4b"/>
  <rect x="46" y="226" width="180" height="8" rx="4" fill="url(#bar1)"/>

  <rect x="46" y="242" width="130" height="8" rx="4" fill="#1e1b4b"/>
  <rect x="46" y="242" width="130" height="8" rx="4" fill="url(#bar2)"/>

  <rect x="46" y="258" width="90" height="8" rx="4" fill="#1e1b4b"/>
  <rect x="46" y="258" width="90" height="8" rx="4" fill="url(#bar3)"/>

  <!-- % labels -->
  <text x="238" y="234" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#818cf8">100%</text>
  <text x="238" y="250" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#a78bfa"> 72%</text>
  <text x="238" y="266" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#818cf8"> 50%</text>

  <!-- Bottom wordmark -->
  <text x="160" y="300" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,monospace" font-size="16" font-weight="bold" fill="#6366f1" filter="url(#glow)" letter-spacing="1">opencode</text>
  <text x="160" y="316" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#a78bfa" letter-spacing="3">x AUTOBE</text>
</svg>
